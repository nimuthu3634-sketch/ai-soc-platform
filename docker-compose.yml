services:
  db:
    image: postgres:16-alpine
    container_name: aegis-core-db
    environment:
      POSTGRES_DB: aegis_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d aegis_core']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aegis-core-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      FRONTEND_ORIGINS: http://localhost:8080
      TRUST_PROXY: false
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aegis_core?schema=public
      JWT_SECRET: change-this-before-deploying
      JWT_EXPIRES_IN: 8h
      JWT_ISSUER: aegis-core
      LOG_LEVEL: info
      AI_ANALYZER_PROVIDER: mock
      AI_ALERT_THRESHOLD: 80
      AI_EXTERNAL_SERVICE_URL: ''
      AI_EXTERNAL_SERVICE_API_KEY: ''
      AI_EXTERNAL_SERVICE_TIMEOUT_MS: 8000
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
        VITE_AI_ANALYSIS_ENABLED: 'true'
    container_name: aegis-core-web
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  postgres-data:
